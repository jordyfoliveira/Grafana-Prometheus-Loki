global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://grafana:3000/login
          - http://prometheus:9090/-/healthy
          - https://github.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-router-http"
    metrics_path: /probe
    params:
      module: [http_router]
    static_configs:
      - targets:
          - http://192.168.1.254
          - https://192.168.1.254
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-dns"
    metrics_path: /probe
    params:
      module: [dns_udp]
    static_configs:
      - targets:
          - 192.168.1.254
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-tcp"
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - grafana:3000
          - prometheus:9090
          - node-exporter:9100
          - blackbox-exporter:9115
          - github.com:443
          - 192.168.1.254:80
          - 192.168.1.254:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "altice-exporter"
    static_configs:
      - targets: ["altice-exporter:9876"]
