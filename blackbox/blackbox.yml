modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      preferred_ip_protocol: "ip4"
      follow_redirects: true

  tcp_connect:
    prober: tcp
    timeout: 5s

  http_router:
    prober: http
    timeout: 5s
    http:
      preferred_ip_protocol: "ip4"
      follow_redirects: true
      valid_status_codes: [200, 301, 302, 401, 403]
      tls_config:
        insecure_skip_verify: true

  dns_udp:
    prober: dns
    timeout: 5s
    dns:
      query_name: "google.com"
      query_type: "A"
      transport_protocol: "udp"
      preferred_ip_protocol: "ip4"
